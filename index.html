<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 3D Snake</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            color: white;
        }

        .avatar-gradient {
            background: linear-gradient(135deg, #6C5CE7, #00BFA6);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #00BFA6, #6C5CE7);
            border: none;
            color: white;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 255, 195, 0.35);
            color: white;
        }

        /* Center the Game Over overlay */
        #gameOverOverlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            width: 300px;
            padding: 30px;
        }
    </style>
</head>
<body>

    <!-- <a href="../index.html" class="btn btn-outline-light position-fixed bottom-0 start-50 translate-middle-x mb-4 rounded-pill px-4 glass-panel" style="z-index: 1000; text-decoration: none;">
        ← Back to Hub
    </a> -->

    <div class="position-fixed top-0 start-0 m-3 p-2 rounded-4 shadow d-flex align-items-center gap-3 glass-panel" style="z-index: 1000; min-width: 200px;">
        <div class="rounded-circle overflow-hidden d-flex justify-content-center align-items-center flex-shrink-0 avatar-gradient" style="width: 65px; height: 65px;">
            <img src="../Image/IMG_20260222_005742.png" alt="Ashutosh Dash" class="w-100 h-100 object-fit-cover" onerror="this.style.display='none'">
        </div>
        <div class="d-flex flex-column">
            <span class="fw-bold" style="font-size: 15px;">Ashutosh Dash</span>
            <span class="text-white-50" style="font-size: 12px;">Software Engineer - Configurator Developer</span>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 m-3 p-3 rounded-4 glass-panel text-center" style="width: 150px; z-index: 1000;">
        <div class="text-white-50 text-uppercase fw-bold" style="font-size: 12px; letter-spacing: 1px;">Score</div>
        <div id="score" class="fw-bold" style="font-size: 28px; color: #00ffc3;">0</div>
    </div>

    <div id="gameOverOverlay" class="rounded-4 glass-panel text-center shadow-lg">
        <h2 class="fw-bold mb-1 text-danger">GAME OVER</h2>
        <p class="text-white-50 mb-4">Final Score: <span id="finalScore" class="fw-bold text-white">0</span></p>
        <button id="restartBtn" class="btn btn-gradient w-100 py-2 rounded-3">Play Again</button>
    </div>

    <div class="position-fixed bottom-0 end-0 m-3 p-3 rounded-4 glass-panel text-center text-white-50" style="z-index: 1000; font-size: 12px;">
        Use <b>Arrow Keys or W A S D</b> to move
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
